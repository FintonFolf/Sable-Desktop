<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: inherit; }
        body {
            background: #1a1a1a;
            color: #f2f2f2;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 13px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            user-select: none;
            overflow: hidden;
        }
        .header { padding: 16px 20px 0; }
        .title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
        .subtitle { font-size: 12px; color: #aaaaaa; margin-bottom: 12px; }
        .tabs { display: flex; border-bottom: 1px solid #404040; }
        .tab {
            padding: 8px 16px;
            cursor: pointer;
            color: #aaaaaa;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
        }
        .tab.active { color: #bdb6ec; border-bottom-color: #bdb6ec; }
        .sources {
            flex: 1;
            overflow-y: auto;
            padding: 12px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
            align-content: start;
        }
        .source {
            border: 2px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            padding: 6px;
            background: #262626;
        }
        .source:hover { border-color: #404040; }
        .source.selected { border-color: #bdb6ec; }
        .source img { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 3px; display: block; background: #111111; }
        .source-name { margin-top: 5px; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #aaaaaa; }
        .footer { padding: 12px 20px; border-top: 1px solid #404040; flex-shrink: 0; }
        .audio-row { display: flex; align-items: center; margin-bottom: 12px; }
        .audio-label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .audio-icon { width: 16px; height: 16px; opacity: 0.7; }
        .toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; inset: 0;
            background: #555555; border-radius: 20px; cursor: pointer;
            transition: background .2s;
        }
        .slider:before {
            content: '';
            position: absolute;
            width: 14px; height: 14px;
            left: 3px; bottom: 3px;
            background: white; border-radius: 50%;
            transition: transform .2s;
        }
        input:checked + .slider { background: #bdb6ec; }
        input:checked + .slider:before { transform: translateX(16px); }
        .buttons { display: flex; gap: 8px; justify-content: flex-end; }
        .btn { padding: 7px 18px; border-radius: 4px; border: none; cursor: pointer; font-size: 13px; }
        .btn-cancel { background: #333333; color: #f2f2f2; }
        .btn-cancel:hover { background: #404040; }
        .btn-share { background: #bdb6ec; color: #2c2843; }
        .btn-share:hover { background: #b2aae9; }
        .btn-share:disabled { background: #333333; color: #666666; cursor: default; }
        .empty { text-align: center; padding: 40px; color: #aaaaaa; }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">Choose what to share</div>
        <div class="subtitle">Sable will be able to see the contents of your screen</div>
        <div class="tabs">
            <div class="tab active" data-tab="screen">Entire Screen</div>
            <div class="tab" data-tab="window">Window</div>
        </div>
    </div>
    <div class="sources" id="sources">
        <div class="empty">Loading sources…</div>
    </div>
    <div class="footer">
        <div class="audio-row">
            <label class="audio-label">
                <div class="toggle">
                    <input type="checkbox" id="audioToggle">
                    <span class="slider"></span>
                </div>
                Also share system audio
            </label>
        </div>
        <div class="buttons">
            <button class="btn btn-cancel" id="cancelBtn">Cancel</button>
            <button class="btn btn-share" id="shareBtn" disabled>Share</button>
        </div>
    </div>
    <script>
        let allSources = [];
        let selectedId = null;
        let currentTab = 'screen';

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentTab = tab.dataset.tab;
                selectedId = null;
                document.getElementById('shareBtn').disabled = true;
                renderSources();
            });
        });

        function renderSources() {
            const container = document.getElementById('sources');
            const filtered = allSources.filter(s =>
                currentTab === 'screen' ? s.id.startsWith('screen:') : !s.id.startsWith('screen:')
            );
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty">No sources available</div>';
                return;
            }
            container.innerHTML = '';
            filtered.forEach(s => {
                const el = document.createElement('div');
                el.className = 'source' + (s.id === selectedId ? ' selected' : '');
                const img = document.createElement('img');
                img.src = s.thumbnail;
                const name = document.createElement('div');
                name.className = 'source-name';
                name.textContent = s.name;
                el.appendChild(img);
                el.appendChild(name);
                el.addEventListener('click', () => {
                    selectedId = s.id;
                    document.querySelectorAll('.source').forEach(x => x.classList.remove('selected'));
                    el.classList.add('selected');
                    document.getElementById('shareBtn').disabled = false;
                });
                container.appendChild(el);
            });
        }

        document.getElementById('cancelBtn').addEventListener('click', () => {
            window.pickerAPI.cancel();
        });

        document.getElementById('shareBtn').addEventListener('click', () => {
            if (!selectedId) return;
            window.pickerAPI.confirm(selectedId, document.getElementById('audioToggle').checked);
        });

        // Hide audio toggle on Linux (loopback not supported)
        window.pickerAPI.getPlatform().then(platform => {
            if (platform === 'linux') {
                document.querySelector('.audio-row').style.display = 'none';
            }
        }).catch(() => {});

        window.pickerAPI.getSources().then(sources => {
            allSources = sources;
            renderSources();
        });
    </script>
</body>
</html>
