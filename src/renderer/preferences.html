<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: inherit; }
        body {
            background: #1a1a1a;
            color: #f2f2f2;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 13px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        .header {
            padding: 20px 24px 16px;
            border-bottom: 1px solid #404040;
            flex-shrink: 0;
        }
        .title { font-size: 18px; font-weight: 700; color: #bdb6ec; margin-bottom: 4px; }
        .subtitle { font-size: 12px; color: #aaaaaa; line-height: 1.5; }
        .section-label {
            font-size: 11px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 14px 24px 6px;
            flex-shrink: 0;
        }
        .list { flex: 1; overflow-y: auto; padding: 4px 12px; }
        .list::-webkit-scrollbar { width: 6px; }
        .list::-webkit-scrollbar-track { background: transparent; }
        .list::-webkit-scrollbar-thumb { background: #404040; border-radius: 3px; }
        .instance {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            margin-bottom: 4px;
        }
        .instance:hover { background: #262626; }
        .instance.selected, .instance.active { border-color: #bdb6ec; background: #1e1c2e; }
        .instance-info { flex: 1; min-width: 0; }
        .instance-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .instance-url { font-size: 11px; color: #aaaaaa; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .radio {
            width: 16px; height: 16px; border-radius: 50%;
            border: 2px solid #555; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .instance.selected .radio { border-color: #bdb6ec; }
        .radio-dot { width: 8px; height: 8px; border-radius: 50%; background: #bdb6ec; display: none; }
        .instance.selected .radio-dot { display: block; }
        .active-badge {
            font-size: 10px; background: #bdb6ec; color: #2c2843;
            padding: 2px 7px; border-radius: 10px; font-weight: 600; flex-shrink: 0;
        }
        .btn-remove {
            background: none; border: none; color: #666; cursor: pointer;
            font-size: 16px; line-height: 1; padding: 2px 4px; border-radius: 4px; flex-shrink: 0;
        }
        .btn-remove:hover { color: #e57373; background: #2c2020; }
        .add-form {
            border-top: 1px solid #404040;
            padding: 12px;
            flex-shrink: 0;
        }
        .add-form.collapsed .form-fields { display: none; }
        .btn-toggle-add {
            width: 100%; padding: 8px;
            background: #262626; color: #aaaaaa;
            border: 1px dashed #404040; border-radius: 6px;
            cursor: pointer; font-size: 13px; text-align: center;
        }
        .btn-toggle-add:hover { background: #2e2e2e; color: #f2f2f2; }
        .add-form.collapsed .btn-toggle-add { display: block; }
        .form-fields { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
        input[type="text"] {
            width: 100%; background: #262626; border: 1px solid #404040;
            border-radius: 5px; color: #f2f2f2; font-size: 13px;
            padding: 7px 10px; outline: none;
        }
        input[type="text"]:focus { border-color: #bdb6ec; }
        input[type="text"]::placeholder { color: #555; }
        .form-actions { display: flex; gap: 8px; justify-content: flex-end; }
        .btn {
            padding: 6px 16px; border-radius: 4px; border: none;
            cursor: pointer; font-size: 13px;
        }
        .btn-cancel { background: #333; color: #f2f2f2; }
        .btn-cancel:hover { background: #404040; }
        .btn-primary { background: #bdb6ec; color: #2c2843; font-weight: 500; }
        .btn-primary:hover { background: #b2aae9; }
        .btn-primary:disabled { background: #333; color: #555; cursor: default; }
        .footer {
            padding: 12px 16px; border-top: 1px solid #404040;
            display: flex; justify-content: flex-end; flex-shrink: 0;
        }
        .btn-continue {
            padding: 8px 24px; background: #bdb6ec; color: #2c2843;
            font-weight: 600; font-size: 13px; border: none;
            border-radius: 6px; cursor: pointer;
        }
        .btn-continue:hover { background: #b2aae9; }
        .btn-continue:disabled { background: #333; color: #555; cursor: default; }
        .empty { text-align: center; padding: 40px 20px; color: #555; }
        .settings-section {
            border-top: 1px solid #404040;
            padding: 12px 24px;
            flex-shrink: 0;
        }
        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0;
        }
        .setting-label { font-size: 13px; color: #f2f2f2; }
        .toggle {
            position: relative; width: 36px; height: 20px; flex-shrink: 0;
        }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .toggle-track {
            position: absolute; inset: 0;
            background: #404040; border-radius: 10px;
            cursor: pointer; transition: background 0.2s;
        }
        .toggle input:checked + .toggle-track { background: #bdb6ec; }
        .toggle-track::after {
            content: ''; position: absolute;
            left: 3px; top: 3px;
            width: 14px; height: 14px;
            background: #f2f2f2; border-radius: 50%;
            transition: transform 0.2s;
        }
        .toggle input:checked + .toggle-track::after { transform: translateX(16px); }
    </style>
</head>
<body>
    <div class="header">
        <div class="title" id="title"></div>
        <div class="subtitle" id="subtitle"></div>
    </div>
    <div class="settings-section" id="settingsSection" style="display:none">
        <div class="section-label" style="padding: 0 0 8px 0;">Settings</div>
        <div class="setting-row">
            <span class="setting-label">Spell Check</span>
            <label class="toggle">
                <input type="checkbox" id="spellcheckToggle" checked>
                <div class="toggle-track"></div>
            </label>
        </div>
    </div>

    <div class="section-label" id="sectionLabel">Servers</div>
    <div class="list" id="list"><div class="empty">Loading…</div></div>

    <div class="add-form collapsed" id="addForm">
        <button class="btn-toggle-add" id="toggleAdd"></button>
        <div class="form-fields">
            <input type="text" id="inputName" placeholder="Name (e.g. My Server)" />
            <input type="text" id="inputUrl"  placeholder="URL (e.g. https://sable.example.com)" />
            <div class="form-actions">
                <button class="btn btn-cancel"  id="cancelAdd">Cancel</button>
                <button class="btn btn-primary" id="confirmAdd" disabled></button>
            </div>
        </div>
    </div>

    <div class="footer" id="footer" style="display:none">
        <button class="btn-continue" id="btnContinue" disabled>Get Started</button>
    </div>

    <script>
        const mode = new URLSearchParams(location.search).get('mode');
        const isWelcome = mode === 'welcome';

        let instances = [];
        let activeUrl = '';
        let selectedInstance = null;

        function esc(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        if (isWelcome) {
            document.getElementById('title').textContent = 'Welcome to Sable';
            document.getElementById('subtitle').textContent = 'Setup your preferences to get started.\nYou can edit your preferences at any time from the tray icon.';
            document.getElementById('sectionLabel').textContent = 'Select a server';
            document.getElementById('footer').style.display = '';
            document.getElementById('toggleAdd').textContent = '+ Use a custom server';
            document.getElementById('confirmAdd').textContent = 'Use this server';
        } else {
            document.getElementById('title').textContent = 'Preferences';
            document.getElementById('subtitle').textContent = 'You can edit your preferences at any time from the tray icon.';
            document.getElementById('toggleAdd').textContent = '+ Add Instance';
            document.getElementById('confirmAdd').textContent = 'Add';
        }

        function render() {
            const list = document.getElementById('list');
            if (instances.length === 0) {
                list.innerHTML = '<div class="empty">No instances configured.</div>';
                return;
            }
            list.innerHTML = '';
            instances.forEach(inst => {
                const el = document.createElement('div');

                if (isWelcome) {
                    const isSelected = selectedInstance?.url === inst.url;
                    el.className = 'instance' + (isSelected ? ' selected' : '');
                    el.innerHTML = `
                        <div class="radio"><div class="radio-dot"></div></div>
                        <div class="instance-info">
                            <div class="instance-name">${esc(inst.name)}</div>
                            <div class="instance-url">${esc(inst.url)}</div>
                        </div>`;
                    el.addEventListener('click', () => selectInstance(inst));
                } else {
                    const isActive = inst.url === activeUrl;
                    el.className = 'instance' + (isActive ? ' active' : '');
                    const info = document.createElement('div');
                    info.className = 'instance-info';
                    info.innerHTML = `<div class="instance-name">${esc(inst.name)}</div>
                                      <div class="instance-url">${esc(inst.url)}</div>`;
                    el.appendChild(info);
                    if (isActive) {
                        const badge = document.createElement('span');
                        badge.className = 'active-badge';
                        badge.textContent = 'Active';
                        el.appendChild(badge);
                    } else {
                        el.addEventListener('click', () => window.instancesAPI.switchInstance(inst.url));
                    }
                    if (instances.length > 1) {
                        const rm = document.createElement('button');
                        rm.className = 'btn-remove';
                        rm.title = 'Remove';
                        rm.textContent = '×';
                        rm.addEventListener('click', async (e) => {
                            e.stopPropagation();
                            instances = await window.instancesAPI.removeInstance(inst.url);
                            render();
                        });
                        el.appendChild(rm);
                    }
                }

                list.appendChild(el);
            });
        }

        function selectInstance(inst) {
            selectedInstance = inst;
            document.getElementById('btnContinue').disabled = false;
            closeForm();
            render();
        }

        async function load() {
            if (isWelcome) {
                instances = await window.instancesAPI.getKnownInstances();
            } else {
                const data = await window.instancesAPI.getInstances();
                instances = data.instances;
                activeUrl = data.activeUrl;
            }
            render();
        }

        const addForm    = document.getElementById('addForm');
        const inputName  = document.getElementById('inputName');
        const inputUrl   = document.getElementById('inputUrl');
        const confirmAdd = document.getElementById('confirmAdd');

        function closeForm() {
            addForm.classList.add('collapsed');
            inputName.value = '';
            inputUrl.value = '';
            confirmAdd.disabled = true;
        }

        document.getElementById('toggleAdd').addEventListener('click', () => {
            addForm.classList.remove('collapsed');
            inputName.focus();
        });

        document.getElementById('cancelAdd').addEventListener('click', closeForm);

        function validateForm() {
            const url = inputUrl.value.trim();
            const name = inputName.value.trim();
            confirmAdd.disabled = !(name && /^https?:\/\/.+/.test(url));
        }

        inputName.addEventListener('input', validateForm);
        inputUrl.addEventListener('input', validateForm);

        confirmAdd.addEventListener('click', async () => {
            const name = inputName.value.trim();
            const url  = inputUrl.value.trim().replace(/\/$/, '');
            const inst = { name, url };

            if (isWelcome) {
                instances.push(inst);
                selectInstance(inst);
            } else {
                instances = await window.instancesAPI.addInstance(inst);
                closeForm();
                render();
            }
        });

        document.getElementById('btnContinue')?.addEventListener('click', () => {
            if (selectedInstance) window.instancesAPI.selectInstance(selectedInstance);
        });

        load();

        if (!isWelcome) {
            document.getElementById('settingsSection').style.display = '';
            window.instancesAPI.getSpellcheck().then(enabled => {
                document.getElementById('spellcheckToggle').checked = enabled;
            });
            document.getElementById('spellcheckToggle').addEventListener('change', (e) => {
                window.instancesAPI.setSpellcheck(e.target.checked);
            });
        }
    </script>
</body>
</html>
